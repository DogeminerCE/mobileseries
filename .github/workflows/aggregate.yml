name: Update Leaderboard

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm install
        
      - name: Run Aggregator
        run: npm run aggregate
        
      - name: Commit and Push (only if data changed)
        run: |
          git config --global user.name "DogeminerCE"
          git config --global user.email "dogeminerdirectory@gmail.com"
          git add public/leaderboard.json
          git diff --quiet && git diff --staged --quiet && echo "NO_CHANGE=true" >> $GITHUB_ENV || (git commit -m "chore: update aggregated leaderboard data" && git push)

      - name: Trigger Vercel Redeploy (only if data changed)
        if: env.NO_CHANGE != 'true'
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
